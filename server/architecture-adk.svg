  <rect x="572" y="358" width="196" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="670" y="374" text-anchor="middle" dominant-baseline="central" fill="#712B13">gemini-live-2.5-flash-preview</text>
  <text class="ts" x="670" y="388" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Voice-in 16kHz · multimodal-out 24kHz</text>

