  <text class="th" x="150" y="232" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Google Cloud Platform</text>

  <!-- Firebase Auth -->
  <rect x="38" y="248" width="224" height="40" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="263" text-anchor="middle" dominant-baseline="central" fill="#085041">Firebase Authentication</text>
  <text class="ts" x="150" y="277" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Anonymous auth · zero friction</text>

  <!-- Firestore -->
  <rect x="38" y="298" width="224" height="40" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="313" text-anchor="middle" dominant-baseline="central" fill="#085041">Cloud Firestore</text>
  <text class="ts" x="150" y="327" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Stories · users · reviews · embeddings</text>

  <!-- Firebase Hosting -->
  <rect x="38" y="348" width="224" height="40" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="363" text-anchor="middle" dominant-baseline="central" fill="#085041">Firebase Hosting</text>
  <text class="ts" x="150" y="377" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Frontend SPA (gen-lang-client.web.app)</text>

  <!-- Artifact Registry -->
  <rect x="38" y="398" width="224" height="40" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="413" text-anchor="middle" dominant-baseline="central" fill="#085041">Artifact Registry</text>
  <text class="ts" x="150" y="427" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Docker container images · us-central1</text>

  <!-- Cloud Build -->
  <rect x="38" y="448" width="224" height="40" rx="7" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="150" y="463" text-anchor="middle" dominant-baseline="central" fill="#085041">Cloud Build + Terraform IaC</text>
  <text class="ts" x="150" y="477" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">CI/CD pipeline · 6-step deploy</text>

  <!-- Cloud Run label in GCP box -->
  <rect x="38" y="498" width="224" height="22" rx="6" fill="#dbeafe" stroke="#185FA5" stroke-width="0.5"/>
  <text class="tm" x="150" y="509" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Cloud Run (ADK Agent Server · Port 8080)</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TIER 3 RIGHT: ADK MULTI-AGENT SYSTEM (Cloud Run)          -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="300" y="210" width="480" height="640" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="540" y="230" text-anchor="middle" dominant-baseline="central" fill="#3C3489">ADK Multi-Agent System · Cloud Run</text>
  <text class="ts" x="540" y="246" text-anchor="middle" dominant-baseline="central" fill="#534AB7">@google/adk for TypeScript  ·  3 agents  ·  4 FunctionTools  ·  8 models</text>

  <!-- ─── Root Agent ─────────────────────────────────────────── -->
  <rect x="320" y="260" width="440" height="46" rx="9" fill="#FBEAF0" stroke="#993556" stroke-width="0.8"/>
  <text class="th" x="540" y="278" text-anchor="middle" dominant-baseline="central" fill="#72243E">OmniWeaveDirector (Root LlmAgent)</text>
  <text class="ts" x="540" y="294" text-anchor="middle" dominant-baseline="central" fill="#993556">gemini-3-flash-preview · orchestration &amp; reasoning</text>

  <!-- Arrow: Director → StoryPipeline -->
  <line x1="430" y1="306" x2="430" y2="328" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="480" y="320" fill="#5F5E5A">delegates story</text>

  <!-- ─── StoryPipeline SequentialAgent ─────────────────────── -->
  <rect x="320" y="328" width="220" height="126" rx="10" fill="rgba(206,203,246,0.35)" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text class="tm" x="430" y="346" text-anchor="middle" dominant-baseline="central" fill="#534AB7" font-weight="600">StoryPipeline (SequentialAgent)</text>

  <!-- StoryWriter -->
  <rect x="334" y="358" width="192" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="430" y="372" text-anchor="middle" dominant-baseline="central" fill="#633806">1. StoryWriter</text>
  <text class="ts" x="430" y="384" text-anchor="middle" dominant-baseline="central" fill="#854F0B">gemini-3.1-pro-preview</text>

  <!-- Arrow Writer → Reviewer -->
  <line x1="430" y1="394" x2="430" y2="406" class="arr" marker-end="url(#arrow)"/>

  <!-- StoryReviewer -->
  <rect x="334" y="406" width="192" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
