  <!-- Model pills — 2 rows of 4 -->
  <rect x="318" y="642" width="110" height="22" rx="11" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text class="ts" x="373" y="653" text-anchor="middle" dominant-baseline="central" fill="#72243E">gemini-live-2.5-flash</text>

  <rect x="436" y="642" width="110" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="491" y="653" text-anchor="middle" dominant-baseline="central" fill="#633806">gemini-3.1-pro</text>

  <rect x="554" y="642" width="115" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="611" y="653" text-anchor="middle" dominant-baseline="central" fill="#633806">gemini-3-flash</text>

  <rect x="677" y="642" width="83" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="718" y="653" text-anchor="middle" dominant-baseline="central" fill="#633806">flash-lite</text>

  <rect x="318" y="670" width="110" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="373" y="681" text-anchor="middle" dominant-baseline="central" fill="#633806">flash-image</text>

  <rect x="436" y="670" width="110" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="491" y="681" text-anchor="middle" dominant-baseline="central" fill="#633806">2.5-pro-tts</text>

  <rect x="554" y="670" width="115" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="611" y="681" text-anchor="middle" dominant-baseline="central" fill="#633806">embedding-2</text>

  <rect x="677" y="670" width="83" height="22" rx="11" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
  <text class="ts" x="718" y="681" text-anchor="middle" dominant-baseline="central" fill="#1b5e20">lyria-rt</text>

  <!-- ─── Streaming protocols legend ────────────────────────── -->
  <rect x="320" y="706" width="440" height="30" rx="6" fill="rgba(83,74,183,0.06)" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="540" y="721" text-anchor="middle" dominant-baseline="central" fill="#3C3489">
    2 streaming protocols: SSE (Compose · story, images, TTS, music, embeddings) · WebSocket bidi (Live voice)
  </text>

  <!-- ─── Arrows: tools from Director ───────────────────────── -->
  <path d="M490 306 L490 450 L425 450 L425 494" fill="none" class="arr" marker-end="url(#arrow)"/>
  <path d="M560 306 L560 450 L654 450 L654 494" fill="none" class="arr" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TIER 4: LEGEND / FOOTER                                    -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="862" width="760" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="400" y="876" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#3C3489" font-family="'Inter', sans-serif">OmniWeave · Creative Storyteller · Gemini Live Agent Challenge</text>
  <text x="400" y="895" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#534AB7" font-family="'Inter', sans-serif">Google ADK for TypeScript · 8 Gemini Models · 6 Google Cloud Services · #GeminiLiveAgentChallenge</text>

  <!-- Lyria arrow label -->
  <line x1="654" y1="544" x2="654" y2="556" class="arr" stroke="#2e7d32" marker-end="url(#arrow)"/>

  <!-- Live mode: WebSocket back to client -->
  <path d="M720 148 L720 540 L760 540 L760 148" fill="none" stroke="#C23B22" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4"/>
  <text class="ts" x="770" y="348" fill="#C23B22" transform="rotate(90,770,348)" text-anchor="middle" opacity="0.6">24kHz audio · text · images back</text>
