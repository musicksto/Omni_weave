  <text class="ts" x="425" y="527" text-anchor="middle" dominant-baseline="central" fill="#854F0B">gemini-3.1-flash-image-preview</text>
  <text class="ts" x="425" y="537" text-anchor="middle" dominant-baseline="central" fill="#854F0B">1K res · 16:9 · Ken Burns animation</text>

  <!-- Tool: generate_speech -->
  <rect x="548" y="494" width="212" height="48" rx="7" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="654" y="512" text-anchor="middle" dominant-baseline="central" fill="#633806">generate_speech</text>
  <text class="ts" x="654" y="527" text-anchor="middle" dominant-baseline="central" fill="#854F0B">gemini-2.5-pro-preview-tts</text>
  <text class="ts" x="654" y="537" text-anchor="middle" dominant-baseline="central" fill="#854F0B">multi-voice · gender-aware · streaming</text>

  <!-- Tool: compute_embedding -->
  <rect x="320" y="556" width="210" height="48" rx="7" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="425" y="574" text-anchor="middle" dominant-baseline="central" fill="#633806">compute_embedding</text>
  <text class="ts" x="425" y="589" text-anchor="middle" dominant-baseline="central" fill="#854F0B">gemini-embedding-2-preview</text>
  <text class="ts" x="425" y="599" text-anchor="middle" dominant-baseline="central" fill="#854F0B">multimodal fingerprint · similarity search</text>

  <!-- Tool: generate_music (Lyria) -->
  <rect x="548" y="556" width="212" height="48" rx="7" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5"/>
  <text class="th" x="654" y="574" text-anchor="middle" dominant-baseline="central" fill="#1b5e20">generate_music</text>
  <text class="ts" x="654" y="589" text-anchor="middle" dominant-baseline="central" fill="#2e7d32">lyria-realtime-exp</text>
  <text class="ts" x="654" y="599" text-anchor="middle" dominant-baseline="central" fill="#2e7d32">Lyria RealTime · mood-aware · SSE</text>

  <!-- ─── Section divider 2 ──────────────────────────────────── -->
  <line x1="320" y1="618" x2="760" y2="618" stroke="#B4B2C9" stroke-width="0.5" stroke-dasharray="4 4"/>
