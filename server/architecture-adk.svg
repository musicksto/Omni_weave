<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1840" viewBox="0 0 800 920">
  <style>
    text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    .th  { font-size: 13px; font-weight: 600; }
    .ts  { font-size: 11px; font-weight: 400; }
    .tl  { font-size: 9px;  font-weight: 500; letter-spacing: 1.8px; }
    .tm  { font-size: 10px; font-weight: 500; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
    .arr-live { stroke: #C23B22; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-live" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C23B22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="920" fill="#fdfbf7" rx="12"/>
  <text x="400" y="20" text-anchor="middle" class="tl" fill="#8b7355">OMNIWEAVE — FULL SYSTEM ARCHITECTURE  ·  8 GEMINI MODELS  ·  6 GOOGLE CLOUD SERVICES</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TIER 1: USER                                               -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="295" y="32" width="210" height="38" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="th" x="400" y="55" text-anchor="middle" dominant-baseline="central" fill="#444441">User (Browser)</text>

  <!-- ─── Two arrows from User ─────────────────────────────── -->
  <!-- Compose: User → Frontend -->
  <line x1="380" y1="70" x2="380" y2="98" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="352" y="88" fill="#5F5E5A" text-anchor="middle">Compose</text>

  <!-- Live: User → Frontend (right side) -->
  <line x1="420" y1="70" x2="420" y2="98" class="arr-live" marker-end="url(#arrow-live)"/>
  <text class="ts" x="448" y="88" fill="#C23B22" text-anchor="middle">Live</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TIER 2: FRONTEND                                           -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="180" y="98" width="440" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="400" y="116" text-anchor="middle" dominant-baseline="central" fill="#712B13">OmniWeave Frontend</text>
  <text class="ts" x="400" y="132" text-anchor="middle" dominant-baseline="central" fill="#993C1D">React 19 · Vite · Framer Motion · Firebase SDK · WebAudio API</text>

  <!-- Frontend → Firebase SDK (left) -->
  <path d="M248 148 L248 172 L135 172 L135 210" fill="none" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="180" y="168" fill="#5F5E5A" text-anchor="middle">Firebase SDK</text>

  <!-- Frontend → ADK REST/SSE (right) -->
  <path d="M552 148 L552 172 L640 172 L640 210" fill="none" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="612" y="168" fill="#5F5E5A" text-anchor="middle">REST / SSE</text>

  <!-- Frontend → ADK WebSocket Live (far right dashed) -->
  <path d="M580 148 L580 172 L720 172 L720 210" fill="none" class="arr-live" marker-end="url(#arrow-live)"/>
  <text class="ts" x="660" y="168" fill="#C23B22" text-anchor="middle">WebSocket</text>

