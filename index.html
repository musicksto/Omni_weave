<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniWeave — Multimodal Creative Storyteller</title>
    <meta name="description" content="A multimodal creative director weaving text, AI images, and multi-voice narration into cinematic stories.">
    <meta name="theme-color" content="#0d0b09">

    <!-- Open Graph -->
    <meta property="og:title" content="OmniWeave — AI Cinematic Engine">
    <meta property="og:description" content="Nine Gemini models orchestrated into cinematic stories — live voice, illustrations, narration, music, and narrative DNA.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://gen-lang-client-0001923421.web.app/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://gen-lang-client-0001923421.web.app/og-image.png">

    <!-- Fonts (preconnect + stylesheet instead of CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0d0b09;
      }
      #root:empty::after {
        content: '';
        width: 32px;
        height: 32px;
        border: 2px solid rgba(194,59,34,0.2);
        border-top-color: #c23b22;
        border-radius: 50%;
        animation: root-spin 0.8s linear infinite;
      }
      @keyframes root-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d0b09;color:#c8baa8;font-family:Georgia,serif;text-align:center;padding:2rem">
        <div>
          <h1 style="font-size:2rem;margin-bottom:1rem">OmniWeave</h1>
          <p>JavaScript is required to run this cinematic storytelling experience.</p>
        </div>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
